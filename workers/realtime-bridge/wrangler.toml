name = "agentcall-realtime-bridge"
main = "src/index.ts"
compatibility_date = "2026-03-02"
compatibility_flags = ["nodejs_compat"]

[vars]
OPENAI_REALTIME_MODEL = "gpt-realtime"
OPENAI_REALTIME_VOICE = "marin"
OPENAI_REALTIME_VOICE_MAP = "{}"
DEFAULT_CALL_LANGUAGE = "ko"
AGENT_NAME = "Alloy"
TWILIO_SIGNATURE_VALIDATION = "false"
TRANSCRIPT_WEBHOOK_URL = "https://agentcall-dashboard.yoonpub0.workers.dev/api/internal/transcript"
STATUS_WEBHOOK_URL = "https://agentcall-dashboard.yoonpub0.workers.dev/api/twilio/status"
CALL_CONTEXT_URL = "https://agentcall-dashboard.yoonpub0.workers.dev/api/internal/call-context"
